name: Auto Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'   # prevent infinite loop

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version by 0.01
        id: bump
        run: |
          CURRENT=$(jq -r '.version' version.json)
          NEW=$(echo "$CURRENT + 0.01" | bc | xargs printf "%.2f")
          echo "{\"version\": \"$NEW\"}" > version.json
          echo "new_version=$NEW" >> $GITHUB_OUTPUT

      - name: Update SW cache version
        run: |
          V="${{ steps.bump.outputs.new_version }}"
          sed -i "s/const APP_VERSION  = '[^']*'/const APP_VERSION  = '$V'/" sw.js

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json sw.js
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push
